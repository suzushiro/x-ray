<style>
:root {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --surface-hover: #f0f0f0;
    --border: #e4e4e4;
    --text: #0f1419;
    --text-dim: #536471;
    --accent: #1d9bf0;
    --video-overlay: rgba(0,0,0,0.35);
}
[data-theme="dark"] {
    --bg: #0f1419;
    --surface: #1a1f26;
    --surface-hover: #232931;
    --border: #2a3038;
    --text: #e7e9ea;
    --text-dim: #8b98a5;
    --accent: #1d9bf0;
    --video-overlay: rgba(0,0,0,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
/* 初回ロード時はtransitionを無効にしてチカチカ防止 */
.no-transition * { transition: none !important; }
body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }

header {
    position: sticky; top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    z-index: 20;
    display: flex; align-items: center; gap: 12px;
}
.header-left { flex: 1; }
header h1 { font-size: 18px; margin: 0 0 2px 0; }
.alpha { font-size: 12px; font-weight: 400; color: var(--text-dim); margin-left: 3px; vertical-align: middle; }

.health {
    font-size: 11px; margin-top: 4px;
    padding: 3px 8px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 5px;
}
.health-ok { background: rgba(0,186,124,0.12); color: #00ba7c; }
.health-warn { background: rgba(244,33,46,0.10); color: #f4212e; }
.health-account { font-weight: 600; }
.health-link { color: inherit; text-decoration: underline; }

.github-btn {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%;
    color: var(--text-dim);
    transition: color 0.15s, background 0.15s;
}
.github-btn:hover { color: var(--text); background: var(--surface); }

.manage-btn {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 50%;
    color: var(--text-dim);
    transition: color 0.15s, background 0.15s;
}
.manage-btn:hover { color: var(--text); background: var(--surface); }
.meta { font-size: 12px; color: var(--text-dim); }

.theme-btn {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s;
}
.theme-btn:hover { background: var(--surface-hover); color: var(--text); }

.tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: sticky;
    top: 0; /* JSで動的に上書きする */
    background: var(--bg);
    z-index: 10;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    flex-shrink: 0; padding: 5px 12px; border-radius: 16px;
    background: var(--surface); color: var(--text-dim);
    text-decoration: none; font-size: 12px; white-space: nowrap;
    border: 1px solid var(--border); transition: background 0.1s;
}
.tab:hover { background: var(--surface-hover); color: var(--text); }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.tab .badge { opacity: 0.7; margin-left: 3px; font-size: 11px; }

main { max-width: 640px; margin: 0 auto; padding-bottom: 40px; }

.tweet { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.tweet:hover { background: var(--surface-hover); }

/* 自己リプライのぶら下がり表示 */
.tweet.self-reply {
    padding-left: 40px;
    position: relative;
    border-bottom: 1px solid var(--border);
}
.reply-connector {
    position: absolute;
    left: 22px;
    top: -12px;
    width: 2px;
    height: 20px;
    background: var(--border);
}

.tweet.is-rt {
    border-left: 3px solid var(--accent);
    padding-left: 13px;
    background: color-mix(in srgb, var(--accent) 6%, var(--bg));
}
.tweet.is-rt:hover {
    background: color-mix(in srgb, var(--accent) 10%, var(--bg));
}
.rt-header {
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 8px; display: flex; align-items: center; gap: 4px;
}
.rt-header a { color: var(--accent); text-decoration: none; }
.rt-header a:hover { text-decoration: underline; }

.tweet-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.tweet-name { font-weight: 700; font-size: 14px; }
.tweet-handle { color: var(--text-dim); font-size: 13px; }
.tweet-time { color: var(--text-dim); font-size: 12px; margin-left: auto; }

.avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-dim);
    overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.tweet-cats { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
.cat-pill { font-size: 10px; background: var(--surface); color: var(--text-dim); padding: 1px 6px; border-radius: 8px; }

.tweet-content { font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; }

/* 写真 */
.tweet-media { border-radius: 12px; overflow: hidden; margin-bottom: 8px; border: 1px solid var(--border); }
.tweet-media img { width: 100%; display: block; cursor: zoom-in; transition: opacity 0.1s; }
.tweet-media img:hover { opacity: 0.88; }
.tweet-media.single img { max-height: 420px; object-fit: contain; background: var(--surface); }
.tweet-media.multi { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.tweet-media.multi img { height: 180px; object-fit: cover; }

/* 動画 */
.video-thumb {
    position: relative; border-radius: 12px; overflow: hidden;
    margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer;
    display: block; text-decoration: none;
}
.video-thumb img { width: 100%; display: block; max-height: 360px; object-fit: cover; }
.video-thumb .play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--video-overlay); transition: background 0.15s;
}
.video-thumb:hover .play-overlay { background: rgba(0,0,0,0.55); }
.play-btn { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; }
.play-btn svg { width: 26px; height: 26px; fill: #111; margin-left: 3px; }
.video-label { position: absolute; bottom: 10px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; }

/* フッター */
.tweet-footer { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-dim); }
.stat { display: flex; align-items: center; gap: 3px; }
.footer-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.dl-btn {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 6px; padding: 3px 9px;
    font-size: 12px; cursor: pointer; font-family: inherit;
    transition: background 0.1s;
}
.dl-btn:hover { background: var(--surface-hover); color: var(--text); }
.dl-btn.done { color: #0f6e56; border-color: #5dcaa5; }

.tweet-link { color: var(--accent); text-decoration: none; font-size: 12px; }
.tweet-link:hover { text-decoration: underline; }

.empty { padding: 60px 20px; text-align: center; color: var(--text-dim); }
.status-link { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 12px; }

/* ライトボックス */
.lb-wrap { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.93); flex-direction: column; }
.lb-wrap.open { display: flex; }
.lb-toolbar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 16px; flex-shrink: 0; }
.lb-tbtn { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: inherit; transition: background 0.12s; }
.lb-tbtn:hover { background: rgba(255,255,255,0.22); }
.lb-body { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: zoom-out; }
.lb-body img { max-width: 92%; max-height: 100%; object-fit: contain; border-radius: 4px; cursor: default; }
.lb-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 28px; cursor: pointer; padding: 12px 10px; border-radius: 8px; line-height: 1; opacity: 0.7; }
.lb-nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.2); }
.lb-prev { left: 12px; }
.lb-next { right: 12px; }
.lb-counter { text-align: center; padding: 10px; color: rgba(255,255,255,0.5); font-size: 12px; flex-shrink: 0; }

/* ===== 共通ナビゲーションバー ===== */
.xnav {
    display: flex; gap: 4px; overflow-x: auto;
    padding: 8px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
    position: sticky; z-index: 9;
}
.xnav::-webkit-scrollbar { display: none; }
.xnav a {
    flex-shrink: 0; padding: 6px 12px; border-radius: 8px;
    color: var(--text-dim); text-decoration: none; font-size: 13px;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
}
.xnav a:hover { background: var(--surface); color: var(--text); }
.xnav a.active { background: var(--accent); color: #fff; }

/* ===== スペースカード ===== */
.space-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; margin-bottom: 10px;
    border-radius: 12px; text-decoration: none;
    border: 1px solid #7c3aed44;
    background: linear-gradient(135deg, #7c3aed18, #a855f708);
    transition: background 0.15s;
}
.space-card:hover { background: linear-gradient(135deg, #7c3aed2a, #a855f715); }
.space-icon {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: #7c3aed; font-size: 19px;
}
.space-body { display: flex; flex-direction: column; gap: 2px; }
.space-label { font-size: 14px; font-weight: 700; color: #a855f7; }
.space-sub { font-size: 12px; color: var(--text-dim); }

/* ===== ブックマークボタン ===== */
.bm-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 15px; padding: 2px 4px;
    transition: color 0.15s, transform 0.15s;
}
.bm-btn:hover { color: #f0b400; transform: scale(1.15); }
.bm-btn.marked { color: #f0b400; }

/* ===== ギャラリーグリッド ===== */
.infinite-sentinel { height: 1px; width: 100%; }
.gallery-grid .infinite-sentinel { grid-column: 1 / -1; }
.infinite-status {
    text-align: center;
    padding: 18px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 20px;
}
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 4px; padding: 4px;
    max-width: 900px; margin: 0 auto;
}
.gallery-item {
    position: relative; aspect-ratio: 1; overflow: hidden;
    border-radius: 8px; cursor: zoom-in; background: var(--surface);
}
.gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }
.gallery-item:hover img { transform: scale(1.05); }
.gallery-item .gi-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: #fff; font-size: 11px; padding: 12px 8px 6px;
    opacity: 0; transition: opacity 0.15s;
}
.gallery-item:hover .gi-overlay { opacity: 1; }

/* ===== ページネーション ===== */
.pagination {
    display: flex; justify-content: center; gap: 10px;
    padding: 20px; max-width: 640px; margin: 0 auto;
}
.pagination a, .pagination span {
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); text-decoration: none; font-size: 13px;
}
.pagination a:hover { background: var(--surface-hover); }
.pagination .disabled { opacity: 0.4; pointer-events: none; }

/* ===== 検索ボックス ===== */
.search-box {
    max-width: 640px; margin: 16px auto; padding: 0 16px;
    display: flex; gap: 8px;
}
.search-box input {
    flex: 1; padding: 10px 14px; border-radius: 24px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 14px; font-family: inherit;
}
.search-box button {
    padding: 10px 20px; border-radius: 24px; border: none;
    background: var(--accent); color: #fff; cursor: pointer; font-size: 14px;
}

/* ===== R18トグル ===== */
.r18-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-dim); cursor: pointer;
    padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border);
    background: var(--surface); text-decoration: none;
}
.r18-toggle.on { background: #f4212e; color: #fff; border-color: #f4212e; }

/* ===== プロフィールヘッダー ===== */
.profile-head {
    max-width: 640px; margin: 0 auto; padding: 20px 16px;
    border-bottom: 1px solid var(--border);
}
.profile-top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.profile-avatar { width: 64px; height: 64px; border-radius: 50%; overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-name { font-size: 20px; font-weight: 700; }
.profile-handle { color: var(--text-dim); font-size: 14px; }
.profile-stats { display: flex; gap: 20px; font-size: 13px; color: var(--text-dim); }
.profile-stats b { color: var(--text); }
.profile-period { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.date-filter { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
.date-filter input[type="date"] {
    padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
}
.date-filter button { padding: 6px 14px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 13px; }

/* ===== ストレージページ ===== */
.storage-wrap { max-width: 640px; margin: 20px auto; padding: 0 16px; }
.storage-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 16px;
}
.storage-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.storage-row:last-child { border-bottom: none; }
.storage-row .label { color: var(--text-dim); }
.storage-row .value { font-weight: 600; font-family: monospace; }
.disk-bar { height: 10px; border-radius: 5px; background: var(--border); overflow: hidden; margin-top: 8px; }
.disk-bar .fill { height: 100%; background: linear-gradient(90deg, #1d9bf0, #00ba7c); }
</style>
