<div class="lb-wrap" id="lb">
    <div class="lb-toolbar">
        <button class="lb-tbtn" id="lb-dl" onclick="lbDownload()">↓ 保存</button>
        <button class="lb-tbtn" onclick="lbClose()">✕</button>
    </div>
    <div class="lb-body" id="lb-body" onclick="lbBodyClick(event)">
        <button class="lb-nav-btn lb-prev" onclick="lbNav(-1)">‹</button>
        <img id="lb-img" src="" alt="">
        <button class="lb-nav-btn lb-next" onclick="lbNav(1)">›</button>
    </div>
    <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
// テーマ
function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('xray-theme', next);
    updateThemeBtn(next);
}
function updateThemeBtn(theme) {
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀️ ライト' : '🌙 ダーク';
}
updateThemeBtn(document.documentElement.getAttribute('data-theme'));

// ライトボックス
let lbImgs = [], lbIdx = 0, lbHandle = '', lbDt = '', lbNames = [];
function lbOpen(imgs, idx, handle, dt, names) {
    lbImgs = imgs; lbIdx = idx; lbHandle = handle; lbDt = dt; lbNames = names || [];
    lbShow();
    document.getElementById('lb').classList.add('open');
    document.addEventListener('keydown', lbKey);
}
function lbShow() {
    document.getElementById('lb-img').src = lbImgs[lbIdx];
    const multi = lbImgs.length > 1;
    const prev = document.querySelector('.lb-prev'), next = document.querySelector('.lb-next');
    if (prev) prev.style.display = multi ? '' : 'none';
    if (next) next.style.display = multi ? '' : 'none';
    document.getElementById('lb-counter').textContent = multi ? `${lbIdx+1} / ${lbImgs.length}` : '';
    const btn = document.getElementById('lb-dl'); btn.textContent = '↓ 保存'; btn.disabled = false;
}
function lbClose() { document.getElementById('lb').classList.remove('open'); document.removeEventListener('keydown', lbKey); }
function lbNav(d) { lbIdx = (lbIdx + d + lbImgs.length) % lbImgs.length; lbShow(); }
function lbBodyClick(e) { if (e.target === document.getElementById('lb-body')) lbClose(); }
function lbKey(e) { if (e.key === 'Escape') lbClose(); if (e.key === 'ArrowRight') lbNav(1); if (e.key === 'ArrowLeft') lbNav(-1); }
function sanitize(s) { return (s || '').replace(/[\\/:*?"<>|]/g, '_'); }
function lbFileName() {
    // 明示名があれば最優先。無ければ handle_date_idx、それも無ければ image_idx
    if (lbNames[lbIdx]) return sanitize(lbNames[lbIdx]);
    const h = sanitize(lbHandle), d = sanitize(lbDt);
    if (h || d) return `${h || 'x'}_${d || 'img'}_${lbIdx+1}.jpg`;
    return `image_${lbIdx+1}.jpg`;
}
async function lbDownload() {
    const btn = document.getElementById('lb-dl'); btn.textContent = '取得中...'; btn.disabled = true;
    try { await dlOne(lbImgs[lbIdx], lbFileName()); btn.textContent = '✓ 保存済み';
        setTimeout(() => { btn.textContent = '↓ 保存'; btn.disabled = false; }, 2000);
    } catch { btn.textContent = '↓ 保存'; btn.disabled = false; }
}
function imgClick(imgEl) {
    const w = imgEl.closest('.tweet-media') || imgEl.closest('.gallery-item');
    const imgs = JSON.parse(atob(w.dataset.imgs));
    let names = [];
    if (w.dataset.tid) {
        // ギャラリー: URLの拡張子を活かして screen_name_tweetid_idx.ext を作る
        const ext = (imgs[0].split('?')[0].split('.').pop() || 'jpg').slice(0, 4);
        names = [`${w.dataset.handle}_${w.dataset.tid}_${w.dataset.fidx || 1}.${ext}`];
    }
    lbOpen(imgs, parseInt(imgEl.dataset.idx || 0),
           w.dataset.handle || '', w.dataset.dt || '', names);
}
async function dlOne(url, fn) {
    const r = await fetch(url); const b = await r.blob();
    const ext = b.type.split('/')[1] || 'jpg';
    const a = document.createElement('a'); a.href = URL.createObjectURL(b);
    a.download = fn.includes('.') ? fn : `${fn}.${ext}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
}
async function dlAllBtn(btnEl) {
    const imgs = JSON.parse(atob(btnEl.dataset.imgs));
    const handle = btnEl.dataset.handle, dt = btnEl.dataset.dt;
    btnEl.textContent = '取得中...'; btnEl.disabled = true;
    try {
        for (let i = 0; i < imgs.length; i++) { await dlOne(imgs[i], `${handle}_${dt}_${i+1}.jpg`); await new Promise(r=>setTimeout(r,300)); }
        btnEl.classList.add('done'); btnEl.textContent = `✓ ${imgs.length}枚完了`;
        setTimeout(() => { btnEl.classList.remove('done'); btnEl.textContent = `↓ ${imgs.length}枚`; btnEl.disabled = false; }, 2500);
    } catch { btnEl.textContent = `↓ ${imgs.length}枚`; btnEl.disabled = false; }
}

// ブックマークトグル
async function toggleBookmark(btn) {
    const tid = btn.dataset.tid;
    const fd = new FormData(); fd.set('tweet_id', tid);
    try {
        const res = await fetch('/api/bookmark/toggle', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.ok) {
            btn.classList.toggle('marked', data.bookmarked);
            btn.textContent = data.bookmarked ? '★' : '☆';
        }
    } catch (e) { console.error(e); }
}

// 初回transition無効でチカチカ防止
document.documentElement.classList.add('no-transition');
requestAnimationFrame(() => { requestAnimationFrame(() => { document.documentElement.classList.remove('no-transition'); }); });

// タブ/ナビのstickyトップをheader高さに合わせる
function adjustStickyTops() {
    const header = document.querySelector('header');
    const nav = document.querySelector('.xnav');
    const tabs = document.querySelector('.tabs');
    if (!header) return;
    const hH = header.offsetHeight;
    if (nav) nav.style.top = hH + 'px';
    if (tabs) tabs.style.top = (hH + (nav ? nav.offsetHeight : 0)) + 'px';
}
adjustStickyTops();
window.addEventListener('resize', adjustStickyTops);
</script>

<script>
// ===== 無限スクロール =====
// data-next-url を持つ番兵(.infinite-sentinel)が見えたら次ページの partial を取得して追記。
(function () {
    let loading = false;
    let done = false;

    function statusEl() { return document.getElementById('infinite-status'); }

    async function loadNext(sentinel) {
        if (loading || done) return;
        const url = sentinel.dataset.nextUrl;
        if (!url) { done = true; return; }
        loading = true;
        const st = statusEl();
        if (st) st.textContent = '読み込み中…';

        try {
            const sep = url.includes('?') ? '&' : '?';
            const res = await fetch(url + sep + 'partial=1', {
                headers: { 'X-Requested-With': 'fetch' }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const html = await res.text();

            const tmp = document.createElement('div');
            tmp.innerHTML = html.trim();

            const container = sentinel.parentNode;  // #feed（TL or grid）
            const newSentinel = tmp.querySelector('.infinite-sentinel');

            // 番兵以外のノードを本体に移す
            Array.from(tmp.childNodes).forEach(node => {
                if (node.nodeType === 1 && node.classList.contains('infinite-sentinel')) return;
                container.insertBefore(node, sentinel);
            });

            // 古い番兵を差し替え or 終了
            sentinel.remove();
            if (newSentinel && newSentinel.dataset.nextUrl) {
                container.appendChild(newSentinel);
                observer.observe(newSentinel);
            } else {
                done = true;
                if (st) st.textContent = 'すべて読み込みました';
            }
            if (st && !done) st.textContent = '';
        } catch (e) {
            if (st) st.textContent = '読み込みに失敗しました（スクロールで再試行）';
            console.error('infinite scroll:', e);
        } finally {
            loading = false;
        }
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) loadNext(entry.target);
        });
    }, { rootMargin: '600px 0px' });  // 手前で先読み

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.infinite-sentinel').forEach(s => observer.observe(s));
    });
})();
</script>
