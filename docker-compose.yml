version: "3.8"

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: x-ray-worker
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/data.db
      - TWITTER_ACCOUNTS_FILE=/data/accounts.txt
      - TWITTER_COOKIES_FILE=/data/cookies.txt
      - ACCOUNTS_JSON_PATH=/data/accounts.json
      - IMAGES_DIR=/data/images
      - SAVE_IMAGES=1
      - TWEETS_PER_USER=10
      - TWS_HTTP_BACKEND=curl

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: x-ray-web
    restart: unless-stopped
    ports:
      - "8501:5000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/data.db
      - TWITTER_COOKIES_FILE=/data/cookies.txt
      - ACCOUNTS_JSON_PATH=/data/accounts.json
      - IMAGES_DIR=/data/images
    depends_on:
      - worker
